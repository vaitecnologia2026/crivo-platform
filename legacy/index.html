<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>VAI · Portal Executivo — Acesso</title>
  <meta name="description" content="Portal de acesso restrito VAI." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0D1F3C;
      --navy-abismo: #091628;
      --orange: #F36E21;
      --orange-deep: #D85A12;
      --off-white: #F2F0EC;
      --prata: #B8C4D0;
      --line: rgba(139, 175, 212, 0.16);
      --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--off-white);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(1100px 560px at 50% -8%, rgba(243, 110, 33, 0.16), transparent 60%),
        radial-gradient(900px 520px at 50% 120%, rgba(74, 111, 165, 0.16), transparent 60%),
        linear-gradient(180deg, var(--navy), var(--navy-abismo));
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px 36px;
      background: rgba(13, 31, 60, 0.55);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px rgba(5, 12, 24, 0.5);
      text-align: center;
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .logo { width: 84px; height: 84px; margin: 0 auto 22px; display: block; }
    .eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--orange);
    }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 10px 0 8px; }
    .sub { font-size: 14.5px; font-weight: 300; color: var(--prata); line-height: 1.6; margin-bottom: 30px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    .field { text-align: left; }
    label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; color: var(--prata); margin-bottom: 7px; }
    input {
      width: 100%; padding: 14px 16px; font-size: 16px; font-family: var(--font);
      color: var(--off-white); background: rgba(9, 22, 40, 0.7);
      border: 1px solid var(--line); border-radius: 10px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.05em;
    }
    input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(243, 110, 33, 0.18); }
    button {
      margin-top: 8px; padding: 14px 16px; font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; font-family: var(--font); cursor: pointer;
      color: #fff; background: var(--orange); border: none; border-radius: 10px;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 12px 30px rgba(243, 110, 33, 0.28);
    }
    button:hover { background: var(--orange-deep); transform: translateY(-1px); }
    button:active { transform: none; }
    button:disabled { opacity: 0.6; cursor: default; transform: none; }
    .error { min-height: 18px; font-size: 13px; color: #FF9B7A; margin-top: 2px; }
    .shake { animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    .foot { margin-top: 30px; font-size: 11.5px; color: var(--prata); letter-spacing: 0.04em; }
    .foot strong { color: var(--off-white); font-weight: 600; }
  </style>
</head>
<body>
  <main class="card" id="card">
    <img class="logo" src="/assets/vai-logo.png" alt="VAI" />
    <span class="eyebrow">Portal Executivo</span>
    <h1>Acesso restrito</h1>
    <p class="sub">Informe seu token de acesso para entrar.</p>

    <form id="gateForm" autocomplete="off">
      <div class="field">
        <label for="token">Token de acesso</label>
        <input type="password" id="token" name="token" placeholder="••••••••" required autofocus />
      </div>
      <div class="error" id="error"></div>
      <button type="submit" id="submit">Entrar</button>
    </form>

    <p class="foot"><strong>VAI</strong> · vai-sistema.com</p>
  </main>

  <script>
    // ⚙️ TOKEN DE ACESSO — troque aqui pelo valor que desejar.
    // ⚠️ Gate client-side: barreira leve (não é segurança forte). Para proteção real,
    //    use a Password Protection da Vercel (server-side).
    var ACCESS_TOKEN = 'VAI2026';
    var DESTINO = '/CRIVO-LP/';

    var form = document.getElementById('gateForm');
    var input = document.getElementById('token');
    var error = document.getElementById('error');
    var card = document.getElementById('card');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (input.value.trim() === ACCESS_TOKEN) {
        try { sessionStorage.setItem('vai_access', 'granted'); } catch (err) {}
        error.textContent = '';
        location.href = DESTINO;
      } else {
        error.textContent = 'Token inválido. Verifique e tente novamente.';
        card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
        input.select();
      }
    });
  </script>
</body>
</html>
