name: CI

# Quality gate — roda em todo push na main e em todo PR.
# Como o deploy é manual (Vercel) e a API auto-deploya no push (Railway),
# este gate é a ÚNICA rede de proteção antes do código chegar perto de produção.
on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck · test · lint · RLS guard
    runs-on: ubuntu-latest
    # DATABASE_URL fake só para o prisma generate / typecheck resolverem o
    # datasource. Nenhuma conexão real é aberta (testes são funções puras).
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DATABASE_URL_APP: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck (todos os apps/pacotes)
        run: pnpm typecheck

      - name: Tests (funções puras de cálculo — ICD)
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: RLS bypass guard (nenhum uso indevido da conexão admin)
        run: pnpm --filter @crivo/api check:rls-bypass
