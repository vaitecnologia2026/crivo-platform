services:
  postgres:
    image: postgres:16-alpine
    container_name: crivo-postgres
    environment:
      POSTGRES_USER: crivo
      POSTGRES_PASSWORD: crivo
      POSTGRES_DB: crivo
    ports:
      - "5432:5432"
    volumes:
      - crivo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crivo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crivo-redis
    ports:
      - "6379:6379"
    volumes:
      - crivo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  crivo_pg:
  crivo_redis:
